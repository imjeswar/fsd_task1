<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body {
    background-color: #7a8592;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}


.container {
    background-color: #303438;
    padding: 30px;
    border-radius: 10px;
    width: 300px;
    color: white;
    text-align: left;
}


h2 {
    text-align: center;
    color: #bcb6aa;
}


input, select {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    margin-bottom: 15px;
    border-radius: 5px;
    border: 1px solid #555;
    background-color: #3c4a59;
    color: white;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 5px;
    border: none;
    cursor: pointer;
}


.login-btn {
    background-color: #ffffff;
    color: black;
}

.register-btn {
    background-color: transparent;
    border: 1px solid #fefefe;
    color: #d5d5d5;
}

a {
    display: block;
    text-align: center;
    margin-top: 10px;
    color: #fef6f6;
    text-decoration: none;
}
</style>

</head>

<body>

<div class="container">
    <h2>Login</h2>

    <label>Email</label>
    <input type="email" id="email" placeholder="Enter email">

    <label>Password</label>
    <input type="password" id="password" placeholder="Enter password">

    <label>Role</label>
    <select id="role">
        <option value="Customer">Customer</option>
        <option value="Admin">Admin</option>
    </select>

    <button class="login-btn" onclick="loginUser()">Login</button>
    <button class="register-btn" onclick="openRegisterPage()">Create Account</button>

    <a href="#" onclick="forgotPassword()">Forgot Password?</a>
</div>

<script>
function loginUser() {
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;
    let role = document.getElementById("role").value;

    if(email=="admin@0123" && password=="admin0123" && role=="Admin"){
        alert("Admin Login Success");
        redirectDashboard("Admin");
        return;
    }
    if(email=="customer@0123" && password=="customer0123" && role=="Customer"){
        alert("Customer Login Success");
        redirectDashboard("Customer");
        return;
    }

    let users = JSON.parse(localStorage.getItem("users")) || [];

    for(let i=0;i<users.length;i++){
        if(users[i].email==email && users[i].password==password && users[i].role==role){
            alert("Login Success");
            redirectDashboard(role);
            return;
        }
    }

    alert("Invalid Login");
}

function redirectDashboard(role){
    if(role=="Admin"){
        window.location.href="admin_dashboard.html";
    } else {
        window.location.href="customer_dashboard.html";
    }
}

function forgotPassword(){
    alert("Please contact admin to reset password");
}

function openRegisterPage(){
    window.location.href="register.html";
}
</script>

</body>
</html>
