<!DOCTYPE html>
<html>
<head>
<title>Customer Dashboard</title>

<style>
body{
    background-color: #7a8592;
    font-family: Arial;
    text-align: center;
}
.container{
    background-color: #303438;
    padding: 20px;
    width: 80%;
    margin: auto;
    color: white;
}
button{
    padding: 10px;
    margin: 5px;
}
table, th, td{
    border: 1px solid white;
    border-collapse: collapse;
    padding: 8px;
}
</style>

</head>

<body>

<div class="container">

<h1>Customer Dashboard</h1>

<button onclick="viewProducts()">View Products</button>
<button onclick="showCart()">My Cart (<span id="cartCount">0</span>)</button>
<button onclick="viewOrders()">My Orders</button>

<div id="main"></div>

</div>

<script>

var cart = [];


function viewProducts(){

    var products = JSON.parse(localStorage.getItem("products")) || [];

    var html = "";

    for(var i=0; i<products.length; i++){

        html += "<div>";
        html += "<h3>" + products[i].name + "</h3>";
        html += "<p>Price: " + products[i].price + "</p>";
        html += "<p>Stock: " + products[i].quantity + "</p>";

        html += "<button onclick='addToCart(" + i + ")'>Add to Cart</button>";

        if(products[i].quantity == 0){
            html += "<p style='color:red;'>Out of Stock</p>";
            html += "<textarea id='req" + i + "' placeholder='Request'></textarea>";
            html += "<button onclick='sendRequest(" + i + ")'>Send</button>";
        }

        html += "</div><hr>";
    }

    document.getElementById("main").innerHTML = html;
}

function addToCart(i){

    var products = JSON.parse(localStorage.getItem("products"));

    if(products[i].quantity > 0){

        cart.push(products[i]);

        products[i].quantity = products[i].quantity - 1;

        localStorage.setItem("products", JSON.stringify(products));

        document.getElementById("cartCount").innerHTML = cart.length;

        alert("Added to cart");

        viewProducts();

    }else{
        alert("Out of Stock");
    }
}


function showCart(){

    if(cart.length == 0){
        document.getElementById("main").innerHTML = "Cart Empty";
        return;
    }

    var html = "<table><tr><th>Name</th><th>Price</th></tr>";

    for(var i=0;i<cart.length;i++){
        html += "<tr>";
        html += "<td>" + cart[i].name + "</td>";
        html += "<td>" + cart[i].price + "</td>";
        html += "</tr>";
    }

    html += "</table>";
    html += "<br><button onclick='placeOrder()'>Place Order</button>";

    document.getElementById("main").innerHTML = html;
}

function placeOrder(){

    if(cart.length == 0){
        alert("Cart empty");
        return;
    }

    var orders = JSON.parse(localStorage.getItem("orders")) || [];

    for(var i=0;i<cart.length;i++){
        orders.push({
            product: cart[i].name,
            status: "Pending"
        });
    }

    localStorage.setItem("orders", JSON.stringify(orders));

    cart = [];

    document.getElementById("cartCount").innerHTML = 0;

    alert("Order Placed");
}

function viewOrders(){

    var orders = JSON.parse(localStorage.getItem("orders")) || [];

    if(orders.length == 0){
        document.getElementById("main").innerHTML = "No Orders";
        return;
    }

    var html = "<table><tr><th>Product</th><th>Status</th></tr>";

    for(var i=0;i<orders.length;i++){
        html += "<tr>";
        html += "<td>" + orders[i].product + "</td>";
        html += "<td>" + orders[i].status + "</td>";
        html += "</tr>";
    }

    html += "</table>";

    document.getElementById("main").innerHTML = html;
}

function sendRequest(i){

    var products = JSON.parse(localStorage.getItem("products"));
    var msg = document.getElementById("req"+i).value;

    if(msg == ""){
        alert("Enter request");
        return;
    }

    var requests = JSON.parse(localStorage.getItem("requests")) || [];

    var obj = {
        product: products[i].name,
        message: msg
    };

    requests.push(obj);

    localStorage.setItem("requests", JSON.stringify(requests));

    alert("Request Sent");
}

</script>

</body>
</html>
