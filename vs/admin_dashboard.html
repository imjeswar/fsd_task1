<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<style>
body {
    background-color: #7a8694;
    font-family: Arial;
    text-align: center;
}
.container {
    background-color: #303438;
    padding: 20px;
    width: 80%;
    margin: auto;
    color: white;
}
input, select {
    width: 90%;
    padding: 10px;
    margin: 10px;
}
button {
    padding: 10px;
    background-color: #bcb6aa;
    border: none;
    margin: 5px;
    cursor: pointer;
}
table, th, td {
    border: 1px solid white;
    border-collapse: collapse;
    padding: 8px;
}
</style>

</head>

<body>

<div class="container">

<h1>Admin Dashboard</h1>

<button onclick="showAdd()">Add Product</button>
<button onclick="viewAllProducts()">View Products</button>
<button onclick="viewAllOrders()">View Orders</button>
<button onclick="viewRequests()">View Requests</button>

<div id="main"></div>

</div>

<script>

function showAdd(){

    var html = "";
    html += "<h2>Add Product</h2>";
    html += "<input id='name' placeholder='Product Name'><br>";
    html += "<input id='price' type='number' placeholder='Price'><br>";
    html += "<input id='category' placeholder='Category'><br>";
    html += "<input id='stock' type='number' placeholder='Stock'><br>";
    html += "<button onclick='addProduct()'>Add Product</button>";

    document.getElementById("main").innerHTML = html;
}

function addProduct(){

    var name = document.getElementById("name").value;
    var price = document.getElementById("price").value;
    var category = document.getElementById("category").value;
    var stock = document.getElementById("stock").value;

    if(name=="" || price=="" || stock==""){
        alert("Fill all fields");
        return;
    }

    var products = JSON.parse(localStorage.getItem("products")) || [];

    var obj = {
        name: name,
        price: price,
        category: category,
        quantity: Number(stock)
    };

    products.push(obj);

    localStorage.setItem("products", JSON.stringify(products));

    alert("Product Added Successfully");
}

function viewAllProducts(){

    var products = JSON.parse(localStorage.getItem("products")) || [];

    if(products.length == 0){
        document.getElementById("main").innerHTML = "No Products";
        return;
    }

    var html = "<h2>Products</h2>";
    html += "<table><tr><th>Name</th><th>Price</th><th>Stock</th></tr>";

    for(var i=0;i<products.length;i++){
        html += "<tr>";
        html += "<td>" + products[i].name + "</td>";
        html += "<td>" + products[i].price + "</td>";
        html += "<td>" + products[i].quantity + "</td>";
        html += "</tr>";
    }

    html += "</table>";

    document.getElementById("main").innerHTML = html;
}

function viewAllOrders(){

    var orders = JSON.parse(localStorage.getItem("orders")) || [];

    if(orders.length == 0){
        document.getElementById("main").innerHTML = "No Orders";
        return;
    }

    var html = "<h2>Orders</h2>";
    html += "<table><tr><th>ID</th><th>Product</th><th>Status</th><th>Update</th></tr>";

    for(var i=0;i<orders.length;i++){

        html += "<tr>";
        html += "<td>" + (i+1) + "</td>";
        html += "<td>" + orders[i].product + "</td>";
        html += "<td>" + orders[i].status + "</td>";

        html += "<td>";
        html += "<select onchange='updateOrderStatus(" + i + ", this.value)'>";

        html += "<option>Pending</option>";
        html += "<option>Completed</option>";
        html += "<option>Cancelled</option>";

        html += "</select>";
        html += "</td>";

        html += "</tr>";
    }

    html += "</table>";

    document.getElementById("main").innerHTML = html;
}


function updateOrderStatus(index, status){

    var orders = JSON.parse(localStorage.getItem("orders"));

    orders[index].status = status;

    localStorage.setItem("orders", JSON.stringify(orders));

    alert("Status Updated");
}


function viewRequests(){

    var requests = JSON.parse(localStorage.getItem("requests")) || [];

    if(requests.length == 0){
        document.getElementById("main").innerHTML = "No Requests";
        return;
    }

    var html = "<h2>Customer Requests</h2>";
    html += "<table><tr><th>Product</th><th>Request</th></tr>";

    for(var i=0;i<requests.length;i++){
        html += "<tr>";
        html += "<td>" + requests[i].product + "</td>";
        html += "<td>" + requests[i].message + "</td>";
        html += "</tr>";
    }

    html += "</table>";

    document.getElementById("main").innerHTML = html;
}

</script>

</body>
</html>
